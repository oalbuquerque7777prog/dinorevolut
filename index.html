<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caveman Adventure - Física Ativada</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #222; 
            color: #eee; 
            margin: 0; 
            overflow: hidden; 
        }
        canvas { 
            border: 4px solid #444; 
            background-color: #87CEEB; /* Cor de céu */
            display: block; 
            margin: 20px auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            image-rendering: pixelated; 
        }
        .ui {
            position: absolute;
            top: 30px;
            width: 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ui">
        <h1>CAVEMAN RUN</h1>
        <p>Pressione <strong style="color: #ffcc00;">ESPAÇO</strong> para Pular</p>
    </div>
    
    <canvas id="gameCanvas" width="800" height="300"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- ATIVOS ---
        const cavemanGif = new Image();
        cavemanGif.src = "caveman_runcycle.gif"; // Certifique-se que o nome está correto

        // --- CONFIGURAÇÕES DE FÍSICA ---
        const gravidade = 0.8;
        const forcaPulo = -15;
        const soloY = 220; // Posição do chão

        // --- ESTADO DO PERSONAGEM ---
        let player = {
            x: 100,
            y: soloY,
            largura: 100,
            altura: 100,
            velocidadeY: 0,
            noChao: true
        };

        // --- CENÁRIO (CHÃO) ---
        let chaoX = 0;
        let velocidadeCenario = 5;

        function update() {
            // 1. Aplicar Gravidade
            player.velocidadeY += gravidade;
            player.y += player.velocidadeY;

            // 2. Checar Colisão com o Chão
            if (player.y >= soloY) {
                player.y = soloY;
                player.velocidadeY = 0;
                player.noChao = true;
            }

            // 3. Movimentar o Chão (Efeito de Corrida)
            chaoX -= velocidadeCenario;
            if (chaoX <= -canvas.width) {
                chaoX = 0;
            }
        }

        function draw() {
            // Limpar tela
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- DESENHAR CÉU E NUVENS (OPCIONAL) ---
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // --- DESENHAR CHÃO ---
            ctx.fillStyle = "#8B4513"; // Cor de terra
            ctx.fillRect(chaoX, 270, canvas.width, 30);
            ctx.fillRect(chaoX + canvas.width, 270, canvas.width, 30);
            
            // Grama ou detalhes no chão
            ctx.fillStyle = "#228B22";
            ctx.fillRect(chaoX, 270, canvas.width, 5);
            ctx.fillRect(chaoX + canvas.width, 270, canvas.width, 5);

            // --- DESENHAR PERSONAGEM (GIF) ---
            if (cavemanGif.complete) {
                // O drawImage desenha o frame atual do GIF na posição Y da física
                ctx.drawImage(
                    cavemanGif, 
                    player.x, 
                    player.y, 
                    player.largura, 
                    player.altura
                );
            }

            // --- LOOP DO JOGO ---
            update();
            requestAnimationFrame(draw);
        }

        // --- CONTROLES ---
        window.addEventListener("keydown", (event) => {
            if (event.code === "Space" && player.noChao) {
                player.velocidadeY = forcaPulo;
                player.noChao = false;
            }
        });

        // Iniciar quando a imagem carregar
        cavemanGif.onload = draw;
    </script>
</body>
</html>
