<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caveman Escape - Obstáculo Animado</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #1a1a1a; 
            color: #eee; 
            margin: 0; 
            overflow: hidden; 
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            margin: 20px auto;
        }
        canvas { 
            border: 5px solid #333; 
            background-color: #87CEEB;
            display: block; 
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }
        /* Configuração do Personagem (GIF) */
        #player-gif {
            position: absolute;
            width: 90px;
            height: 90px;
            pointer-events: none;
            image-rendering: pixelated;
            z-index: 10;
        }
        /* Configuração do Novo Obstáculo (GIF) */
        #obstacle-gif {
            position: absolute;
            width: 90px; /* Ajuste o tamanho baseado no seu GIF */
            height: 90px;
            pointer-events: none;
            image-rendering: pixelated;
            z-index: 5; /* Atrás do jogador, se cruzarem */
        }
        .score {
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px #000;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div style="margin-top: 20px;">
        <h1>CAVEMAN ESCAPE</h1>
        <p>Fuja dos animais com <strong style="color: #ffcc00;">ESPAÇO</strong></p>
    </div>

    <div id="game-container">
        <div class="score" id="scoreLabel">SCORE: 0</div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <img id="player-gif" src="caveman_runcycle.gif" alt="Cavaleiro Correndo">
        <img id="obstacle-gif" src="horse_run_cycle.gif" alt="Cavalo Correndo">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const playerImg = document.getElementById("player-gif");
        const obstacleImg = document.getElementById("obstacle-gif");
        const scoreLabel = document.getElementById("scoreLabel");

        // --- CONFIGURAÇÕES DE FÍSICA ---
        const gravidade = 0.8;
        const forcaPulo = -17; // Um pouco mais forte para desviar do cavalo
        const POSICAO_CHAO = 270; 
        
        // Estado do Jogador
        let player = {
            x: 80, y: 180,
            largura: 80, altura: 85, // Hitbox
            velocidadeY: 0,
            noChao: true
        };

        // Estado do Obstáculo (Cavalo)
        let obstaculo = {
            x: 900,
            y: 180, // Mesma altura do chão para correr
            largura: 80, // Hitbox (baseada no tamanho da img)
            altura: 85,
            velocidade: 8
        };

        let chaoX = 0;
        let score = 0;
        let gameActive = true;

        function resetGame() {
            score = 0;
            obstaculo.x = 900;
            obstaculo.velocidade = 8;
            player.velocidadeY = 0;
            player.y = POSICAO_CHAO - player.altura;
            gameActive = true;
            scoreLabel.innerText = "SCORE: 0";
            requestAnimationFrame(draw);
        }

        function update() {
            if (!gameActive) return;

            // 1. Física do Jogador
            player.velocidadeY += gravidade;
            player.y += player.velocidadeY;

            if (player.y + player.altura >= POSICAO_CHAO) {
                player.y = POSICAO_CHAO - player.altura;
                player.velocidadeY = 0;
                player.noChao = true;
            }

            // 2. Movimento do Obstáculo (Cavalo)
            obstaculo.x -= obstaculo.velocidade;
            if (obstaculo.x < -obstaculo.largura) {
                obstaculo.x = 800 + Math.random() * 500; // Renasce aleatoriamente
                score++;
                scoreLabel.innerText = "SCORE: " + score;
                obstaculo.velocidade += 0.25; // Aumenta dificuldade
            }

            // 3. Detecção de Colisão (AABB)
            if (player.x < obstaculo.x + obstaculo.largura &&
                player.x + player.largura > obstaculo.x &&
                player.y < obstaculo.y + obstaculo.altura &&
                player.y + player.altura > obstaculo.y) {
                
                gameOver();
            }

            // 4. Movimento do Cenário
            chaoX -= obstaculo.velocidade;
            if (chaoX <= -canvas.width) chaoX = 0;

            // 5. SINCRONIZAR GIFS (Onde a mágica acontece)
            // Sincroniza a tag <img> com a física do JavaScript
            playerImg.style.left = player.x + "px";
            playerImg.style.top = player.y + "px";

            obstacleImg.style.left = obstaculo.x + "px";
            obstacleImg.style.top = obstaculo.y + "px";
        }

        function gameOver() {
            gameActive = false;
            ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "#f87171"; // Vermelho suave
            ctx.font = "bold 40px Courier New";
            ctx.fillText("PEGOU VOCÊ!", 260, 140);
            ctx.fillStyle = "white";
            ctx.font = "20px Courier New";
            ctx.fillText("Pressione ESPAÇO para reiniciar", 220, 180);
        }

        function draw() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Céu
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, POSICAO_CHAO);

            // Desenhar Terra
            ctx.fillStyle = "#8B4513"; 
            ctx.fillRect(chaoX, POSICAO_CHAO, canvas.width, canvas.height - POSICAO_CHAO);
            ctx.fillRect(chaoX + canvas.width, POSICAO_CHAO, canvas.width, canvas.height - POSICAO_CHAO);
            
            // Linha do Chão
            ctx.fillStyle = "black";
            ctx.fillRect(0, POSICAO_CHAO, canvas.width, 4);

            update();
            requestAnimationFrame(draw);
        }

        // --- CONTROLES ---
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (gameActive && player.noChao) {
                    player.velocidadeY = forcaPulo;
                    player.noChao = false;
                } else if (!gameActive) {
                    resetGame();
                }
            }
        });

        // Iniciar
        draw();
    </script>
</body>
</html>
