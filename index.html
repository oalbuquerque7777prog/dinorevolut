<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Caveman Adventure - GIF Animado</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #222; 
            color: #eee; 
            margin: 0; 
            overflow: hidden; 
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 300px;
            margin: 20px auto;
        }
        canvas { 
            border: 4px solid #444; 
            background-color: #87CEEB;
            display: block; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        /* O segredo: Esta tag exibe o GIF animado real sobre o jogo */
        #player-gif {
            position: absolute;
            width: 100px;
            height: 100px;
            pointer-events: none; /* Não interfere nos cliques */
            image-rendering: pixelated;
        }
        .ui { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>CAVEMAN RUN</h1>
        <p>Pressione <strong style="color: #ffcc00;">ESPAÇO</strong> para Pular</p>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        <img id="player-gif" src="caveman_runcycle.gif" alt="Running Caveman">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const playerImg = document.getElementById("player-gif");

        // --- CONFIGURAÇÕES ---
        const gravidade = 0.8;
        const forcaPulo = -16;
        const POSICAO_CHAO = 270; 

        let player = {
            x: 100,
            y: 170, // Começa no chão
            largura: 100,
            altura: 100,
            velocidadeY: 0,
            noChao: true
        };

        let chaoX = 0;
        let velocidadeCenario = 6;

        function update() {
            // 1. Física
            player.velocidadeY += gravidade;
            player.y += player.velocidadeY;

            // 2. Colisão Solo
            if (player.y + player.altura >= POSICAO_CHAO) {
                player.y = POSICAO_CHAO - player.altura;
                player.velocidadeY = 0;
                player.noChao = true;
            }

            // 3. Movimento do Cenário
            chaoX -= velocidadeCenario;
            if (chaoX <= -canvas.width) chaoX = 0;

            // 4. ATUALIZAR POSIÇÃO DO GIF (Onde a mágica acontece)
            // Sincroniza a posição da imagem HTML com a física do jogo
            playerImg.style.left = player.x + "px";
            playerImg.style.top = player.y + "px";
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenhar Céu
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, POSICAO_CHAO);

            // Desenhar Terra
            ctx.fillStyle = "#8B4513"; 
            ctx.fillRect(chaoX, POSICAO_CHAO, canvas.width, canvas.height);
            ctx.fillRect(chaoX + canvas.width, POSICAO_CHAO, canvas.width, canvas.height);
            
            // Linha do Chão
            ctx.fillStyle = "black";
            ctx.fillRect(chaoX, POSICAO_CHAO, canvas.width, 4);
            ctx.fillRect(chaoX + canvas.width, POSICAO_CHAO, canvas.width, 4);

            // Grama
            ctx.fillStyle = "#228B22";
            ctx.fillRect(chaoX, POSICAO_CHAO - 6, canvas.width, 6);
            ctx.fillRect(chaoX + canvas.width, POSICAO_CHAO - 6, canvas.width, 6);

            update();
            requestAnimationFrame(draw);
        }

        // --- CONTROLES ---
        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && player.noChao) {
                player.velocidadeY = forcaPulo;
                player.noChao = false;
            }
        });

        // Iniciar
        draw();
    </script>
</body>
</html>
